schema: spec-driven
context: |
  本项目维护一个高项备考仓库。
  当前规范源头位于 openspec/specs。
  主来源文档是仓库根目录下的《高项-三色笔记.pdf》。
  chapters/ 目录保存的是派生学习资产，并与 PDF 目录保持 24 章一一对应。
  openspec/ 下的规范性文档默认使用中文编写。
rules:
  proposal: |
    说明为什么需要这次变更、影响了哪些学习资产、以及这次变更是否会影响 PDF 对照关系。
  design: |
    记录 OpenSpec 结构、能力边界、以及规范层与派生学习资产之间边界的设计决策。
  tasks: |
    使用可核验的勾选项；如果同时修改规范和章节内容，任务清单中应同时体现两者。
  spec: |
    使用规范化要求表达，优先描述仓库行为、来源对齐要求、章节资产要求和语言要求，不写空泛说明。
